<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVE | Fitness Tracker</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>MOVE <span>.</span></h1>
        <div class="btn-container">
            <button id="openModalBtn" class="btn-primary">+ Add Workout</button>
        </div>
    </header>

    <section class="filter-container">
    <div class="filter-group">
        <label for="filter-day">Day:</label>
        <select id="filter-day" class="custom-select">
            <option value="All">All Days</option>
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
            <option value="Saturday">Saturday</option>
            <option value="Sunday">Sunday</option>
        </select>
    </div>

    <div class="filter-group">
        <label for="filter-status">Status:</label>
        <select id="filter-status" class="custom-select">
            <option value="All">All Status</option>
            <option value="Finished">Completed ✅</option>
            <option value="Not Completed">In Progress ⏳</option>
        </select>
    </div>
</section>

    <main id="dashboard">
        <div id="emptyState">
            <p>No workouts logged yet. Time to move! 💪</p>
            <img src="images/workout.png" alt="workout">
        </div>
    </main>

    <dialog id="workoutModal">
        <form id="workoutForm" method="dialog">
            <h2>New Activity</h2>
            
            <label for="type">Activity Type</label>
            <select id="type" required>
                <option value="Running">Running 👟</option>
                <option value="Cycling">Cycling 🚲</option>
                <option value="Gym">Gym 💪</option>
                <option value="Swimming">Swimming 🥽</option>
                <option value="Jumping-rope">Jumping rope</option>
                <option value="Others">Others</option>
            </select>

            <div class="hidden-Activity">
                <label for="activity-type">Enter Activity </label>
                <input type="text" id="activity-type" placeholder="others...">
            </div>

            <label for="day">Day</label>
            <select id="day" required>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>

            <label for="duration">Duration (mins)</label>
            <input type="number" id="duration" placeholder="30" required>

            <div class="modal-actions">
                <button type="button" id="closeModalBtn" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save Activity</button>
            </div>
        </form>
    </dialog>

    <script type="module" src="js/main.js"></script>
</body>
</html>
